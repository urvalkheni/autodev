version: 2

project_name: autodev

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: autodev
    main: ./main.go
    binary: autodev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: HEETMEHTA18
    name: autodev
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  header: |
    ## AutoDev {{ .Tag }} — Clone. Scan. Install. Build. 🚀
    
    See [CHANGELOG.md](https://github.com/HEETMEHTA18/autodev/blob/main/CHANGELOG.md) for details.
  footer: |
    **Full Changelog**: https://github.com/HEETMEHTA18/autodev/compare/{{ .PreviousTag }}...{{ .Tag }}

