      darwin:
        method: npm
        packages: [create-svelte]
      windows:
        method: npm
        packages: [create-svelte]
    verify: npx create-svelte --version

  - id: django
    name: Django
    category: Frameworks
    description: High-level Python web framework
    icon: 🎸
    deps: [python]
    install:
      linux:
        method: pip
        packages: [django]
      darwin:
