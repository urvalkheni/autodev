project_name: autodev

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: autodev
    main: ./main.go
    binary: autodev
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE
      - CHANGELOG.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: HEETMEHTA18
    name: autodev
  name_template: "v{{ .Version }}"
  draft: false
  prerelease: auto
  header: |
    ## AutoDev {{ .Tag }} — Clone. Scan. Install. Build. 🚀
    
    See [CHANGELOG.md](https://github.com/autodev-sh/autodev/blob/main/CHANGELOG.md) for details.
  footer: |
    **Full Changelog**: https://github.com/autodev-sh/autodev/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - name: autodev
    repository:
      owner: HEETMEHTA18
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://autodev.dev"
    description: "The App Store for Developers — Clone. Scan. Install. Build."
    license: MIT
    test: |
      system "#{bin}/autodev --version"

scoops:
  - repository:
      owner: HEETMEHTA18
      name: scoop-bucket
    homepage: "https://autodev.dev"
    description: "The App Store for Developers"
    license: MIT

dockers:
  - image_templates:
      - "ghcr.io/heetmehta18/autodev:{{ .Tag }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    dockerfile: ../../Dockerfile

announce:
  twitter:
    enabled: false
