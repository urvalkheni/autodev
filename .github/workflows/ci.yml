name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Go CLI ────────────────────────────────────────────────────────────────
  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Install golangci-lint
        run: curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.59.0
      - name: Run golangci-lint
        run: |
          for dir in packages/*; do
            if [ -d "$dir" ] && [ -f "$dir/go.mod" ]; then
              echo "Linting $dir..."
              (cd "$dir" && $(go env GOPATH)/bin/golangci-lint run --timeout=5m)
            fi
          done

  go-test:
    name: Go Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [cli, core, scanner, installer, skills, github, catalog]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Test ${{ matrix.module }}
        working-directory: packages/${{ matrix.module }}
        run: |
          go mod download
          go test ./... -v -race -coverprofile=coverage.txt -covermode=atomic
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: packages/${{ matrix.module }}/coverage.txt
          flags: ${{ matrix.module }}

  go-build:
    name: Go Build
    runs-on: ubuntu-latest
    needs: [go-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Build CLI
        working-directory: packages/cli
        run: go build -v -o bin/autodev ./main.go
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: autodev-linux-amd64
          path: packages/cli/bin/autodev

  # ── Website ───────────────────────────────────────────────────────────────
  website-lint:
    name: Website Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install
      - run: pnpm --filter=website lint
      - run: pnpm --filter=website build

  # ── Cross-platform build check ────────────────────────────────────────────
  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    needs: [go-test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        working-directory: packages/cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o bin/autodev-${{ matrix.goos }}-${{ matrix.goarch }} ./main.go
