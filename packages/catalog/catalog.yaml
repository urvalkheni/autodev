    category: DevOps
    description: Tool for defining multi-container Docker applications
    icon: 🐙
    deps: [docker]
    install:
      linux:
        method: script
        script:
          - sudo apt-get install -y docker-compose-plugin
      darwin:
        method: brew
        packages: [docker-compose]
      windows:
        method: manual
        script:
          - echo "Docker Compose is bundled with Docker Desktop on Windows"
