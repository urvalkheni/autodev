          - curl -fsSL https://get.docker.com | sh
          - sudo usermod -aG docker $USER
          - newgrp docker
      darwin:
        method: brew
        packages: [docker]
      windows:
        method: winget
        packages: ["Docker.DockerDesktop"]
    verify: docker --version

  - id: docker-compose
