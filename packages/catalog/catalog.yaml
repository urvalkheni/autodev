# AutoDev Package Catalog
# The single source of truth for all installable packages.
# To add a new package: add a YAML entry. That's it.
#
# Structure:
#   id:          unique identifier used in CLI
#   name:        display name
#   category:    Languages | Frameworks | Databases | DevOps | Mobile | AI/ML | WebDev
#   description: one-line description
#   icon:        emoji icon
#   deps:        list of package IDs that must be installed first
#   install:
#     linux|darwin|windows:
#       method: apt | brew | winget | script | npm | pip | cargo | manual
#       packages: [...] (for apt/brew/winget)
#       script: [...] (array of shell commands)
#   post_install: shell commands to run after install (PATH fixes etc.)
#   verify: command to verify installation succeeded

packages:

  # ============================================================
  # LANGUAGES
  # ============================================================

  - id: python
    name: Python
    category: Languages
    description: General-purpose scripting and data language
    icon: 🐍
    install:
      linux:
        method: apt
        packages: [python3, python3-pip, python3-venv, python3-dev]
      darwin:
        method: brew
        packages: [python@3.12]
      windows:
        method: winget
        packages: ["Python.Python.3"]
    verify: python3 --version

  - id: nodejs
    name: Node.js
    category: Languages
    description: JavaScript runtime built on Chrome's V8 engine
    icon: 🟢
    install:
      linux:
        method: script
        script:
          - curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash -
          - sudo apt-get install -y nodejs
      darwin:
        method: brew
        packages: [node@22]
      windows:
        method: winget
        packages: ["OpenJS.NodeJS.LTS"]
    verify: node --version

  - id: go
    name: Go
    category: Languages
    description: Fast, statically typed compiled language by Google
    icon: 🔵
    install:
      linux:
        method: script
        script:
          - curl -fsSL https://go.dev/dl/go1.22.2.linux-amd64.tar.gz -o /tmp/go.tar.gz
          - sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf /tmp/go.tar.gz
          - echo 'export PATH=$PATH:/usr/local/go/bin' >> ~/.bashrc
      darwin:
        method: brew
        packages: [go]
      windows:
        method: winget
        packages: ["GoLang.Go"]
    verify: go version

  - id: rust
    name: Rust
    category: Languages
    description: Systems language focused on safety and performance
    icon: 🦀
    install:
      linux:
        method: script
        script:
          - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          - source "$HOME/.cargo/env"
      darwin:
        method: script
        script:
          - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      windows:
        method: winget
        packages: ["Rustlang.Rust.MSVC"]
    verify: rustc --version

  - id: java
    name: Java (OpenJDK 21)
    category: Languages
    description: Cross-platform object-oriented language (LTS)
    icon: ☕
    install:
      linux:
        method: apt
        packages: [openjdk-21-jdk, openjdk-21-jre]
      darwin:
        method: brew
        packages: [openjdk@21]
      windows:
        method: winget
        packages: ["Microsoft.OpenJDK.21"]
    verify: java -version

  - id: kotlin
    name: Kotlin
    category: Languages
    description: Modern language for Android and JVM
    icon: 🎯
    deps: [java]
    install:
      linux:
        method: apt
        packages: [kotlin]
      darwin:
        method: brew
        packages: [kotlin]
      windows:
        method: winget
        packages: ["JetBrains.Kotlin"]
    verify: kotlin -version

  - id: php
    name: PHP
    category: Languages
    description: Server-side scripting language for web development
    icon: 🐘
    install:
      linux:
        method: apt
        packages: [php, php-cli, php-fpm, php-mysql, php-zip, php-gd, php-mbstring, php-curl, php-xml, php-bcmath]
      darwin:
        method: brew
        packages: [php]
      windows:
        method: winget
        packages: ["PHP.PHP"]
    verify: php --version

  - id: ruby
    name: Ruby
    category: Languages
    description: Dynamic, expressive language for web development
    icon: 💎
    install:
      linux:
        method: apt
        packages: [ruby-full]
      darwin:
        method: brew
        packages: [ruby]
      windows:
        method: winget
        packages: ["RubyInstallerTeam.Ruby"]
    verify: ruby --version

  - id: dart
    name: Dart
    category: Languages
    description: Client-optimized language for fast apps on any platform
    icon: 🎯
    install:
      linux:
        method: script
        script:
          - sudo apt-get update && sudo apt-get install apt-transport-https
          - wget -qO- https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/dart.gpg
          - echo 'deb [signed-by=/usr/share/keyrings/dart.gpg arch=amd64] https://storage.googleapis.com/download.dartlang.org/linux/debian stable main' | sudo tee /etc/apt/sources.list.d/dart_stable.list
          - sudo apt-get update && sudo apt-get install dart
      darwin:
        method: brew
        packages: [dart]
      windows:
        method: winget
        packages: ["Dart.Dart"]
    verify: dart --version

  - id: swift
    name: Swift
    category: Languages
    description: Powerful language for Apple platforms and Linux
    icon: 🦉
    install:
      linux:
        method: script
        script:
          - sudo apt-get install -y clang libicu-dev
          - curl -fsSL https://download.swift.org/swift-5.10-release/ubuntu2204/swift-5.10-RELEASE/swift-5.10-RELEASE-ubuntu22.04.tar.gz -o /tmp/swift.tar.gz
          - sudo tar xzf /tmp/swift.tar.gz -C /opt
          - echo 'export PATH=/opt/swift-5.10-RELEASE-ubuntu22.04/usr/bin:$PATH' >> ~/.bashrc
      darwin:
        method: manual
        script:
          - xcode-select --install
      windows:
        method: winget
        packages: ["Swift.Toolchain"]
    verify: swift --version

